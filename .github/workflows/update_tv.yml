name: Auto Update Link TV StreamPro

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Mengambil isi folder
      uses: actions/checkout@v4

    - name: Menyiapkan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Menginstal dependensi
      run: pip install requests

    - name: Menjalankan Script Penyaring Link TV
      run: |
        python - <<EOF
        import requests

        # Mengambil daftar ratusan TV dari sumber terbuka komunitas (sangat stabil)
        url_sumber = "https://raw.githubusercontent.com/TundranM/ID-IPTV/main/iptv.m3u"
        
        try:
            r = requests.get(url_sumber)
            r.raise_for_status()
            baris_teks = r.text.splitlines()
            
            # Daftar TV yang ingin kita curi dari sumber
            target_tv = {
                'RCTI': 'rcti.m3u8', 
                'MNCTV': 'mnctv.m3u8', 
                'GTV': 'gtv.m3u8',
                'GLOBAL TV': 'gtv.m3u8',
                'INEWS': 'inews.m3u8'
            }
            
            tv_ditemukan = None
            for baris in baris_teks:
                # Jika baris ini memuat nama TV
                if baris.startswith('#EXTINF'):
                    tv_ditemukan = None
                    for kunci in target_tv:
                        if kunci in baris.upper():
                            tv_ditemukan = kunci
                            break
                # Jika baris ini memuat link http dan TV sudah ditemukan sebelumnya
                elif baris.startswith('http') and tv_ditemukan:
                    nama_file = target_tv[tv_ditemukan]
                    # Buat file fisik .m3u8 nya
                    with open(nama_file, "w") as f:
                        f.write(f"#EXTM3U\n#EXTINF:-1,{tv_ditemukan} Live\n{baris}\n")
                    print(f"✅ Sukses membuat {nama_file}")
                    tv_ditemukan = None # Reset agar tidak tertimpa
                    
        except Exception as e:
            print(f"❌ Gagal mengambil data: {e}")
        EOF

    - name: Menyimpan File ke Repositori Bos
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update otomatis link TV (Versi Komunitas)"
        file_pattern: "*.m3u8"
