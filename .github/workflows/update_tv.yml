name: Auto Update Link TV StreamPro

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Mengambil isi folder
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }} # Menambahkan identitas resmi

    - name: Menyiapkan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Menginstal dependensi
      run: pip install requests beautifulsoup4

    - name: Menjalankan Script
      run: |
        python - <<EOF
        import requests
        import re

        channels = {
            'rcti': 'https://www.rctiplus.com/tv/rcti',
            'mnctv': 'https://www.rctiplus.com/tv/mnctv',
            'gtv': 'https://www.rctiplus.com/tv/gtv',
            'inews': 'https://www.rctiplus.com/tv/inews'
        }
        headers = {'User-Agent': 'Mozilla/5.0'}
        for name, url in channels.items():
            try:
                r = requests.get(url, headers=headers)
                match = re.search(r'(https://[a-zA-Z0-9\-\./_]+master\.m3u8\?[^"\']+)', r.text)
                if match:
                    with open(f"{name}.m3u8", "w") as f:
                        f.write(f"#EXTM3U\n#EXTINF:-1,{name.upper()} Live\n{match.group(1)}\n")
            except Exception as e:
                print(f"Error {name}: {e}")
        EOF

    - name: Commit dan Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add *.m3u8
        git commit -m "Update otomatis link TV" || exit 0
        git push
