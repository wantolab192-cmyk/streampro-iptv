name: Auto Update Link TV StreamPro

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

# Wajib untuk mengizinkan bot menyimpan file
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Mengambil isi folder
      uses: actions/checkout@v4

    - name: Menyiapkan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Menginstal dependensi
      run: pip install requests beautifulsoup4

    - name: Menjalankan Script Pencari Token
      run: |
        python - <<EOF
        import requests
        import re

        channels = {
            'rcti': 'https://www.rctiplus.com/tv/rcti',
            'mnctv': 'https://www.rctiplus.com/tv/mnctv',
            'gtv': 'https://www.rctiplus.com/tv/gtv',
            'inews': 'https://www.rctiplus.com/tv/inews'
        }
        headers = {'User-Agent': 'Mozilla/5.0'}
        for name, url in channels.items():
            try:
                r = requests.get(url, headers=headers)
                match = re.search(r'(https://[a-zA-Z0-9\-\./_]+master\.m3u8\?[^"\']+)', r.text)
                if match:
                    with open(f"{name}.m3u8", "w") as f:
                        f.write(f"#EXTM3U\n#EXTINF:-1,{name.upper()} Live\n{match.group(1)}\n")
                    print(f"Sukses mendapatkan {name}")
            except Exception as e:
                print(f"Error {name}: {e}")
        EOF

    # 🔥 INI JURUS ULTIMATE-NYA: Plugin otomatis untuk Push tanpa error 128 🔥
    - name: Menyimpan dan Push File ke GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update otomatis link TV"
        file_pattern: "*.m3u8"
